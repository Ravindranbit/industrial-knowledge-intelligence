services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: datacenter_kb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: datacenter_kb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:latest
    container_name: datacenter_kb_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # Neo4j Browser UI
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  neo4jdata:
